<!doctype html>
<html><head><meta charset="utf-8"><title>synthetic receipt 02</title><style>
  body { margin: 0; padding: 24px; background: #eee; }

  .c { text-align: center; } .b { font-weight: bold; } .lg { font-size: 16px; }
  .row { display: flex; justify-content: space-between; }

  @media print { body { background: #fff; padding: 0; } .r { width: 72mm; } }
</style></head><body><div class="r">
  <div class="c b lg">RESTORAN GEMBIRA</div>
  <div class="c">LOT 7, JALAN PASAR LAMA,<br>43000 KAJANG, SELANGOR</div>
  <hr>
  <div class="row"><span>RCPT #17752</span><span>03/04/26</span></div>
  <div class="row"><span>TABLE 6</span><span>13:05</span></div>
  <hr>
  <div class="row"><span>NASI GORENG AYAM</span><span>4.20</span></div>
  <div class="row"><span>TEH TARIK</span><span>3.80</span></div>
  <hr>
  <div class="row b"><span>TOTAL</span><span>RM 8.00</span></div>
  <div class="row"><span>CASH</span><span>10.00</span></div>
  <div class="row"><span>CHANGE</span><span>2.00</span></div>
  <hr>
  <div class="c">TERIMA KASIH</div>
</div></body></html>
